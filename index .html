<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة المعدل التراكمي</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}
.container{
    max-width:450px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}
h2{
    text-align:center;
}
h3{
    text-align:center;
	color:blue;
}
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:#fff;
    cursor:pointer;
}
button:hover{
    background:#0b5ed7;
}
.result{
    margin-top:20px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:green;
}
</style>
</head>
<body>

<div class="container">
    <h2>حاسبة المعدل التراكمي</h2>
 <h3>من ثمانية مستويات </h3>
    <h3>احسب المعدل التراكمي بكل سهولة</h3>
    <h3>أدخل معدل كل مستوى</h3>

    <input type="number" step="0.01" id="g1" placeholder="المستوى الأول">
    <input type="number" step="0.01" id="g2" placeholder="المستوى الثاني">
    <input type="number" step="0.01" id="g3" placeholder="المستوى الثالث">
    <input type="number" step="0.01" id="g4" placeholder="المستوى الرابع">
    <input type="number" step="0.01" id="g5" placeholder="المستوى الخامس">
    <input type="number" step="0.01" id="g6" placeholder="المستوى السادس">
    <input type="number" step="0.01" id="g7" placeholder="المستوى السابع">
    <input type="number" step="0.01" id="g8" placeholder="المستوى الثامن">

    <button onclick="calc()">اضغط هنا</button>

    <div class="result" id="result"></div>
</div>

<script>
function calc() {
    let ids = ["g1", "g2", "g3", "g4", "g5", "g6", "g7", "g8"];
    let sum = 0;
    let count = 0;

    for (let id of ids) {
        let v = parseFloat(document.getElementById(id).value);
        if (!isNaN(v)) {
            sum += v;
            count++;
        }
    }

    if (count === 0) {
        document.getElementById("result").innerHTML = "أدخل المعدلات أولاً";
        return;
    }

    let cgpa = (sum / count).toFixed(2);
    document.getElementById("result").innerHTML = "المعدل التراكمي = " + cgpa;
}
</script>

</body>
</html>
